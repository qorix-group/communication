# Workflow configuration for S-CORE CI - Bazel Build & Test communication module
# This workflow runs Bazel test with enabled thread sanitizer when triggered by specific pull request events.

name: Test communication module with thread sanitizer
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
  workflow_call:
concurrency:
  group: thread_sanitizer-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request'}}
env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""
jobs:
    build_and_test_tsan:
      runs-on: ubuntu-24.04
      permissions:
        contents: read
      steps:
        - name: Checkout repository
          uses: actions/checkout@v6.0.2
        - name: Free Disk Space (Ubuntu)
          uses: eclipse-score/more-disk-space@v1
          with:
            level: 4
        - uses: castler/setup-bazel@79bc547e94dea617d8524202a81e5cbcc3b6d9ea
          with:
            bazelisk-cache: true
            disk-cache: "build_and_test_tsan"
            disk-cache-key: "main"
            repository-cache: true
            cache-save: ${{ github.ref == 'refs/heads/main' }}
        - name: Allow linux-sandbox
          uses: ./actions/unblock_user_namespace_for_linux_sandbox
        - name: Bazel test communication targets with thread sanitizer
          run: |
            bazel test --config=tsan //... --build_tests_only
