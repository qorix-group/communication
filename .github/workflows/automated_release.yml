# Workflow configuration for automated release process
# This workflow is triggered manually via workflow_dispatch and expects a release tag input.
# It creates a draft release, runs all tests, and either leaves or removes the draft release based on results.

name: Automated Release Process
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create (example: v1.2.3)"
        required: true
        type: string

env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""

jobs:
  create-draft-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
      release-url: ${{ steps.create-release.outputs.url }}
      release-tag: ${{ steps.release-tag.outputs.release-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set release tag from workflow dispatch input
        id: release-tag
        run: |
          echo "Release version tag: ${{ github.event.inputs.release_tag }}"
          echo "release-tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.release-tag }}
          name: ${{ steps.release-tag.outputs.release-tag }}
          body_path: .github/RELEASE_TEMPLATE.md
          draft: true
          prerelease: false
          target_commitish: ${{ github.sha }}

  run-build-and-test-host:
    needs: create-draft-release
    uses: ./.github/workflows/build_and_test_host.yml
    with:
      run_all_configurations: true
    permissions:
      contents: read

  run-build-and-test-qnx:
    needs: create-draft-release
    uses: ./.github/workflows/build_and_test_qnx.yml
    permissions:
      contents: read
      pull-requests: read
    secrets:
      SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
      SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
      SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}

  run-thread-sanitizer:
    needs: create-draft-release
    uses: ./.github/workflows/thread_sanitizer.yml
    permissions:
      contents: read

  run-address-sanitizer:
    needs: create-draft-release
    uses: ./.github/workflows/address_undefined_behavior_leak_sanitizer.yml
    permissions:
      contents: read

  run-coverage-report:
    needs: create-draft-release
    uses: ./.github/workflows/coverage_report.yml
    permissions:
      contents: read

  upload-coverage-report:
    needs:
      - create-draft-release
      - run-coverage-report
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-coverage-report.outputs.artifact-name }}
          path: ./

      - name: Upload coverage report to existing draft release
        run: |
          gh release upload "${{ needs.create-draft-release.outputs.release-tag }}" "${{ needs.run-coverage-report.outputs.artifact-name }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    runs-on: ubuntu-24.04
    needs:
      - create-draft-release
      - run-build-and-test-host
      - run-build-and-test-qnx
      - run-thread-sanitizer
      - run-address-sanitizer
      - run-coverage-report
      - upload-coverage-report
    if: ${{ success() }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Report success
        run: |
          echo "All workflows succeeded. Draft release ${{ needs.create-draft-release.outputs.release-tag }} is ready for manual publishing."

  delete-release-on-failure:
    runs-on: ubuntu-24.04
    needs:
      - create-draft-release
      - run-build-and-test-host
      - run-build-and-test-qnx
      - run-thread-sanitizer
      - run-address-sanitizer
      - run-coverage-report
      - upload-coverage-report
    if: ${{ failure() || cancelled() }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Delete draft release due to failure
        run: |
          gh release delete ${{ needs.create-draft-release.outputs.release-tag }} --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        run: |
          echo "One or more workflows failed. Draft release has been deleted."
          exit 1
